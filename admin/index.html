<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>genDeck 管理画面</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #050a2f;
      --muted: #526077;
      --line: #050a2f;
      --paper: #fbfdff;
      --surface: #ffffff;
      --marker: #9ccdff;
      --marker-strong: #6eb5ff;
      --marker-soft: #e7f4ff;
      --grid: rgba(123, 177, 218, 0.09);
      --grid-strong: rgba(123, 177, 218, 0.14);
      --danger: #a43d32;
      --ok: #075c80;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        linear-gradient(var(--grid-strong) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-strong) 1px, transparent 1px),
        var(--paper);
      background-size: 24px 24px, 24px 24px, 120px 120px, 120px 120px, auto;
      color: var(--ink);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 44px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 22px;
      padding: 18px 0;
    }

    h1 {
      position: relative;
      display: inline-block;
      isolation: isolate;
      margin: 0;
      margin-left: -6px;
      padding: 0 6px;
      font-size: clamp(34px, 6vw, 68px);
      font-weight: 900;
      line-height: 1.02;
      letter-spacing: 0;
    }

    .subhead {
      max-width: 560px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--ink);
      font-size: 13px;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--marker-strong);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
      gap: 18px;
      align-items: start;
    }

    section {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .panel {
      padding: 20px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .drop {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 210px;
      padding: 24px;
      border: 1.5px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      text-align: center;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .drop.is-dragging {
      border-color: var(--marker-strong);
      background: var(--marker-soft);
    }

    .file-input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .drop-title {
      margin: 0;
      font-size: 21px;
      font-weight: 700;
    }

    .drop-note {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    button,
    .download-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 10px 15px;
      border: 1px solid transparent;
      border-radius: 8px;
      font: inherit;
      font-weight: 700;
      line-height: 1.2;
      text-decoration: none;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.46;
    }

    .primary {
      background: var(--ink);
      color: #fff;
    }

    .secondary {
      background: #fff;
      border-color: var(--line);
      color: var(--ink);
    }

    .warm {
      background: var(--marker);
      border-color: var(--line);
      color: var(--ink);
    }

    details {
      margin-top: 18px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    summary {
      cursor: pointer;
      color: var(--ink);
      font-weight: 700;
    }

    textarea {
      width: 100%;
      min-height: 260px;
      margin-top: 12px;
      padding: 14px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    .summary-grid {
      display: grid;
      gap: 10px;
      margin: 0;
    }

    .metric {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .metric dt {
      color: var(--muted);
      font-size: 13px;
    }

    .metric dd {
      margin: 0;
      min-width: 0;
      overflow-wrap: break-word;
      font-weight: 700;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--marker-soft);
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
    }

    .message {
      margin-top: 14px;
      padding: 13px 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .message.ok {
      border-color: var(--line);
      background: var(--marker-soft);
      color: var(--ok);
    }

    .message.error {
      border-color: rgba(164, 61, 50, 0.3);
      background: rgba(164, 61, 50, 0.08);
      color: var(--danger);
    }

    .result {
      margin-top: 16px;
      padding: 16px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid var(--line);
    }

    .result .metric {
      grid-template-columns: 1fr;
      gap: 4px;
    }

    .download-link {
      width: 100%;
      margin-top: 12px;
      background: var(--ink);
      color: #fff;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    footer {
      margin-top: 20px;
      color: var(--muted);
      font-size: 12px;
    }

    [hidden] {
      display: none !important;
    }

    @media (max-width: 820px) {
      main {
        width: min(100% - 22px, 680px);
        padding-top: 20px;
      }

      header,
      .layout {
        display: block;
      }

      .status-pill {
        margin-top: 14px;
      }

      section {
        margin-bottom: 14px;
      }

      .metric {
        grid-template-columns: 1fr;
        gap: 4px;
      }

      .drop {
        min-height: 180px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>genDeck 管理画面</h1>
        <p class="subhead">ChatGPTが作ったdeck JSONを読み込み、PPTXに変換します。生成できたら、ダウンロードURLからPowerPointを開けます。</p>
      </div>
      <div class="status-pill" aria-live="polite"><span class="dot"></span><span id="apiStatus">API確認中</span></div>
    </header>

    <div class="layout">
      <section class="panel" aria-labelledby="inputTitle">
        <h2 id="inputTitle">JSONを選ぶ</h2>
        <div id="dropZone" class="drop">
          <input id="fileInput" class="file-input" type="file" accept="application/json,.json" aria-label="deck JSONファイルを選択">
          <div>
            <p class="drop-title">deck JSONファイルを選択</p>
            <p class="drop-note" id="fileName">ファイルをドラッグするか、この枠をクリックしてください。</p>
          </div>
        </div>
        <div class="actions">
          <button id="sampleButton" class="secondary" type="button">サンプルJSONで試す</button>
          <button id="validateButton" class="secondary" type="button" disabled>JSON確認</button>
          <button id="generateButton" class="primary" type="button" disabled>生成する</button>
        </div>
        <details>
          <summary>JSONを貼り付ける</summary>
          <textarea id="jsonInput" spellcheck="false" placeholder="{&#10;  &quot;deck_title&quot;: &quot;sample_deck&quot;,&#10;  &quot;color&quot;: &quot;terracotta&quot;,&#10;  &quot;slides&quot;: []&#10;}"></textarea>
          <div class="actions">
            <button id="usePasteButton" class="warm" type="button">貼り付けたJSONを使う</button>
          </div>
        </details>
        <div id="message" class="message">JSONを読み込むと、タイトル、枚数、type、colorを確認できます。</div>
      </section>

      <aside>
        <section class="panel" aria-labelledby="summaryTitle">
          <h2 id="summaryTitle">確認</h2>
          <dl class="summary-grid">
            <div class="metric">
              <dt>deck title</dt>
              <dd id="deckTitle">未選択</dd>
            </div>
            <div class="metric">
              <dt>slide count</dt>
              <dd id="slideCount">0</dd>
            </div>
            <div class="metric">
              <dt>slide type</dt>
              <dd><div id="typeList" class="chips"><span class="chip">未確認</span></div></dd>
            </div>
            <div class="metric">
              <dt>color</dt>
              <dd><div id="colorList" class="chips"><span class="chip">未確認</span></div></dd>
            </div>
          </dl>
          <div id="result" class="result" hidden></div>
        </section>
      </aside>
    </div>

    <footer>API: <span id="apiBase"></span></footer>
  </main>

  <script>
    const state = {
      raw: "",
      deck: null,
      valid: false,
      apiBase: window.location.origin
    };

    const el = {
      apiBase: document.getElementById("apiBase"),
      apiStatus: document.getElementById("apiStatus"),
      dropZone: document.getElementById("dropZone"),
      fileInput: document.getElementById("fileInput"),
      fileName: document.getElementById("fileName"),
      sampleButton: document.getElementById("sampleButton"),
      validateButton: document.getElementById("validateButton"),
      generateButton: document.getElementById("generateButton"),
      usePasteButton: document.getElementById("usePasteButton"),
      jsonInput: document.getElementById("jsonInput"),
      message: document.getElementById("message"),
      deckTitle: document.getElementById("deckTitle"),
      slideCount: document.getElementById("slideCount"),
      typeList: document.getElementById("typeList"),
      colorList: document.getElementById("colorList"),
      result: document.getElementById("result")
    };

    el.apiBase.textContent = state.apiBase;

    function setMessage(text, kind) {
      el.message.textContent = text;
      el.message.className = "message" + (kind ? " " + kind : "");
    }

    function setChips(container, values) {
      container.innerHTML = "";
      const list = values.length ? values : ["未確認"];
      list.forEach((value) => {
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.textContent = value;
        container.appendChild(chip);
      });
    }

    function summarize(deck) {
      const slides = Array.isArray(deck.slides) ? deck.slides : [];
      const types = [...new Set(slides.map((slide) => slide.type).filter(Boolean))];
      const colors = [...new Set([deck.color, ...slides.map((slide) => slide.color)].filter(Boolean))];
      el.deckTitle.textContent = deck.deck_title || "未設定";
      el.slideCount.textContent = String(slides.length);
      setChips(el.typeList, types);
      setChips(el.colorList, colors);
    }

    function resetSummary() {
      el.deckTitle.textContent = "未選択";
      el.slideCount.textContent = "0";
      setChips(el.typeList, []);
      setChips(el.colorList, []);
    }

    function validateDeck(raw) {
      let deck;
      const errors = [];
      try {
        deck = JSON.parse(raw);
      } catch (error) {
        return { deck: null, errors: ["JSONとして読めません: " + error.message] };
      }

      if (!deck || typeof deck !== "object" || Array.isArray(deck)) {
        errors.push("トップレベルはobjectにしてください。");
      }
      if (!deck.deck_title || typeof deck.deck_title !== "string") {
        errors.push("deck_title が必要です。");
      }
      if (!Array.isArray(deck.slides)) {
        errors.push("slides はarrayにしてください。");
      } else if (deck.slides.length === 0) {
        errors.push("slides は1枚以上必要です。");
      } else {
        deck.slides.forEach((slide, index) => {
          if (!slide || typeof slide !== "object") {
            errors.push(`slides[${index}] はobjectにしてください。`);
            return;
          }
          if (!slide.type) {
            errors.push(`slides[${index}].type が必要です。`);
          }
          if (!slide.content || typeof slide.content !== "object") {
            errors.push(`slides[${index}].content が必要です。`);
          }
        });
      }

      return { deck, errors };
    }

    function acceptRaw(raw, label) {
      state.raw = raw.trim();
      el.jsonInput.value = state.raw;
      el.fileName.textContent = label;
      el.validateButton.disabled = !state.raw;
      el.generateButton.disabled = true;
      el.result.hidden = true;
      validateCurrent();
    }

    function validateCurrent() {
      const result = validateDeck(state.raw || el.jsonInput.value);
      state.deck = result.deck;
      state.valid = result.errors.length === 0;

      if (result.deck) {
        summarize(result.deck);
      } else {
        resetSummary();
      }

      el.generateButton.disabled = !state.valid;
      if (state.valid) {
        setMessage("JSON確認OKです。生成できます。", "ok");
      } else {
        setMessage(result.errors.join("\n"), "error");
      }
    }

    async function loadFile(file) {
      if (!file) return;
      const text = await file.text();
      acceptRaw(text, file.name);
    }

    async function loadSample() {
      try {
        const response = await fetch("/sample-deck.json", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const text = await response.text();
        acceptRaw(text, "specs/deck_sample.json");
      } catch (error) {
        setMessage("サンプルJSONを読み込めませんでした: " + error.message, "error");
      }
    }

    async function checkApi() {
      try {
        const response = await fetch("/health", { cache: "no-store" });
        const data = await response.json();
        el.apiStatus.textContent = data.ok ? "API接続OK" : "API確認エラー";
      } catch (error) {
        el.apiStatus.textContent = "API未接続";
      }
    }

    async function generateDeck() {
      validateCurrent();
      if (!state.valid) return;

      el.generateButton.disabled = true;
      el.generateButton.textContent = "生成中";
      el.result.hidden = true;
      setMessage("PPTXを生成しています。少し待ってください。", "");

      try {
        const response = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(state.deck)
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          throw new Error(data.detail || data.error || `HTTP ${response.status}`);
        }
        showResult(data);
        setMessage("生成できました。ダウンロードURLを開いてください。", "ok");
      } catch (error) {
        setMessage("生成に失敗しました。\n" + error.message + "\nJSONのtype、content、画像パス、QR URLを確認してください。", "error");
      } finally {
        el.generateButton.textContent = "生成する";
        el.generateButton.disabled = !state.valid;
      }
    }

    function showResult(data) {
      const sizeKb = Math.round(data.size_bytes / 1024).toLocaleString("ja-JP");
      el.result.innerHTML = `
        <strong>生成結果</strong>
        <dl class="summary-grid" style="margin-top:12px">
          <div class="metric"><dt>filename</dt><dd>${escapeHtml(data.filename)}</dd></div>
          <div class="metric"><dt>size</dt><dd>${sizeKb} KB</dd></div>
        </dl>
        <a class="download-link" href="${escapeAttribute(data.download_url)}" target="_blank" rel="noopener">PPTXを開く</a>
      `;
      el.result.hidden = false;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    el.fileInput.addEventListener("change", (event) => loadFile(event.target.files[0]));
    el.sampleButton.addEventListener("click", loadSample);
    el.validateButton.addEventListener("click", validateCurrent);
    el.generateButton.addEventListener("click", generateDeck);
    el.usePasteButton.addEventListener("click", () => acceptRaw(el.jsonInput.value, "貼り付けJSON"));

    ["dragenter", "dragover"].forEach((name) => {
      el.dropZone.addEventListener(name, (event) => {
        event.preventDefault();
        el.dropZone.classList.add("is-dragging");
      });
    });
    ["dragleave", "drop"].forEach((name) => {
      el.dropZone.addEventListener(name, (event) => {
        event.preventDefault();
        el.dropZone.classList.remove("is-dragging");
      });
    });
    el.dropZone.addEventListener("drop", (event) => loadFile(event.dataTransfer.files[0]));

    checkApi();
  </script>
</body>
</html>
